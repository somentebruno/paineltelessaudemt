<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 300px;
      height: 300px;
      background: transparent;
      overflow: hidden;
    }
    .wrap {
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .logo-map-img {
      width: 112px;
      height: auto;
      display: block;
      position: relative;
      z-index: 1;
    }
    .logo-orbit-svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo-map-img" id="mapImg" alt="Mato Grosso" />
    <svg class="logo-orbit-svg" viewBox="0 0 250 250" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-orbit" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="1.5" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <g transform="translate(125,125)">
        <circle r="93" stroke="rgba(36,112,212,0.22)" stroke-width="1.3" stroke-dasharray="160 424" fill="none">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
        </circle>
        <circle r="78" stroke="rgba(36,112,212,0.14)" stroke-width="0.9" stroke-dasharray="110 380" fill="none">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="28s" repeatCount="indefinite" />
        </circle>
        <circle cx="93" cy="0" r="3" fill="#2470d4" opacity="0.75" filter="url(#glow-orbit)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
        </circle>
        <circle cx="-69" cy="-63" r="2.5" fill="#2470d4" opacity="0.55" filter="url(#glow-orbit)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
        </circle>
        <circle cx="-78" cy="0" r="2.5" fill="#1a56a0" opacity="0.50" filter="url(#glow-orbit)">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="28s" repeatCount="indefinite" />
        </circle>
        <circle cx="0" cy="-78" r="2.2" fill="#1a56a0" opacity="0.40" filter="url(#glow-orbit)">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="28s" repeatCount="indefinite" />
        </circle>
        <circle cx="55" cy="55" r="2" fill="#2470d4" opacity="0.35" filter="url(#glow-orbit)">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="28s" repeatCount="indefinite" />
        </circle>
      </g>
    </svg>
  </div>
  <script>
    const src = document.currentScript.dataset.src || window._logoSrc;
    document.getElementById('mapImg').src = window._logoSrc || '';
  </script>
</body>
</html>
